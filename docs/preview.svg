<svg viewBox="0 0 1162 524" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F2FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6200EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="thumb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EDE9FE"/>
      <stop offset="1" stop-color="#DDD6FE"/>
    </linearGradient>
  </defs>
  <rect width="1162" height="524" rx="20" fill="url(#bg)"/>

  <!-- ============ PHONE 1 — LOGIN ============ -->
  <g transform="translate(24,30)">
    <rect x="0" y="0" width="210" height="440" rx="30" fill="#14141C"/>
    <rect x="8" y="8" width="194" height="424" rx="24" fill="#FFFFFF"/>
    <rect x="78" y="16" width="54" height="13" rx="6.5" fill="#14141C"/>
    <text x="22" y="27" font-size="9" font-weight="700" fill="#1A1A2E">9:41</text>
    <g fill="#1A1A2E"><rect x="168" y="20" width="14" height="7" rx="1.5"/><rect x="160" y="21" width="4" height="6" rx="1"/></g>
    <!-- logo -->
    <rect x="83" y="120" width="44" height="44" rx="13" fill="url(#brand)"/>
    <path d="M93 134 h22 l-2.5 13 h-17 z" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linejoin="round"/>
    <path d="M99 134 a6 6 0 0 1 12 0" fill="none" stroke="#FFFFFF" stroke-width="2.4"/>
    <text x="105" y="182" text-anchor="middle" font-size="15" font-weight="800" fill="#1A1A2E">MarketCy</text>
    <text x="105" y="222" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6200EE">Enter Your Phone Number</text>
    <!-- phone input -->
    <rect x="26" y="240" width="158" height="38" rx="9" fill="#FFFFFF" stroke="#C6C6C6" stroke-width="1.4"/>
    <text x="38" y="263" font-size="11" font-weight="700" fill="#1A1A2E">TR  +90</text>
    <line x1="86" y1="248" x2="86" y2="270" stroke="#E2E2E2" stroke-width="1.2"/>
    <text x="96" y="263" font-size="11" fill="#9CA3AF">5•• ••• •• ••</text>
    <!-- button -->
    <rect x="40" y="296" width="130" height="38" rx="10" fill="#6200EE"/>
    <text x="105" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Send me the code!</text>
    <!-- languages -->
    <text x="105" y="410" text-anchor="middle" font-size="9.5" font-weight="600" fill="#6B7280">English · Türkçe · Україна · فارسی</text>
    <text x="105" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#4B5563">Phone login</text>
  </g>

  <!-- ============ PHONE 2 — DISCOVER (MAP) ============ -->
  <g transform="translate(250,30)">
    <rect x="0" y="0" width="210" height="440" rx="30" fill="#14141C"/>
    <clipPath id="scr2"><rect x="8" y="8" width="194" height="424" rx="24"/></clipPath>
    <g clip-path="url(#scr2)">
      <rect x="8" y="8" width="194" height="424" fill="#E9EEF2"/>
      <!-- map roads -->
      <g stroke="#FFFFFF" stroke-width="7" fill="none" opacity="0.9">
        <path d="M8 120 H202"/><path d="M8 250 H202"/><path d="M70 8 V432"/><path d="M150 8 V432"/>
      </g>
      <g stroke="#D7DEE5" stroke-width="2" fill="none"><path d="M8 180 H202"/><path d="M110 8 V432"/></g>
      <rect x="20" y="135" width="40" height="40" rx="4" fill="#DCE6DD"/>
      <rect x="158" y="265" width="36" height="50" rx="4" fill="#DCE6DD"/>
      <!-- pins -->
      <g transform="translate(64,110)"><path d="M0 0 C-9 0 -14 7 -14 14 C-14 23 0 34 0 34 C0 34 14 23 14 14 C14 7 9 0 0 0 Z" fill="#6200EE"/><circle cy="14" r="5.5" fill="#FFFFFF"/></g>
      <g transform="translate(146,196)"><path d="M0 0 C-9 0 -14 7 -14 14 C-14 23 0 34 0 34 C0 34 14 23 14 14 C14 7 9 0 0 0 Z" fill="#009588"/><circle cy="14" r="5.5" fill="#FFFFFF"/></g>
      <!-- bottom card -->
      <rect x="18" y="338" width="174" height="78" rx="13" fill="#FFFFFF"/>
      <rect x="28" y="348" width="58" height="58" rx="9" fill="url(#thumb)"/>
      <text x="95" y="366" font-size="11" font-weight="800" fill="#1A1A2E">Sayılı Market</text>
      <text x="95" y="383" font-size="8.5" fill="#6B7280">Caesar Resort · İskele</text>
      <text x="95" y="399" font-size="8.5" font-weight="700" fill="#009588">Open · 9am–11pm</text>
    </g>
    <rect x="78" y="16" width="54" height="13" rx="6.5" fill="#14141C"/>
    <text x="105" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#4B5563">Map discovery</text>
  </g>

  <!-- ============ PHONE 3 — PRODUCTS ============ -->
  <g transform="translate(476,30)">
    <rect x="0" y="0" width="210" height="440" rx="30" fill="#14141C"/>
    <rect x="8" y="8" width="194" height="424" rx="24" fill="#FFFFFF"/>
    <rect x="78" y="16" width="54" height="13" rx="6.5" fill="#14141C"/>
    <!-- category tabs -->
    <g transform="translate(0,46)">
      <rect x="16" y="0" width="44" height="26" rx="8" fill="#6200EE"/><text x="38" y="17" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFFFFF">All</text>
      <rect x="66" y="0" width="56" height="26" rx="8" fill="#F2F2F2"/><text x="94" y="17" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4B5563">Dairy</text>
      <rect x="128" y="0" width="66" height="26" rx="8" fill="#F2F2F2"/><text x="161" y="17" text-anchor="middle" font-size="9.5" font-weight="600" fill="#4B5563">Bakery</text>
    </g>
    <!-- searchbar -->
    <rect x="16" y="84" width="178" height="30" rx="15" fill="#F2F2F2"/>
    <circle cx="34" cy="99" r="5" fill="none" stroke="#9CA3AF" stroke-width="1.6"/><line x1="38" y1="103" x2="42" y2="107" stroke="#9CA3AF" stroke-width="1.6"/>
    <text x="48" y="103" font-size="9.5" fill="#9CA3AF">Search Products</text>
    <!-- product grid -->
    <g transform="translate(16,128)">
      <!-- card 1 (discounted) -->
      <rect x="0" y="0" width="84" height="138" rx="11" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
      <rect x="10" y="10" width="64" height="62" rx="8" fill="url(#thumb)"/>
      <text x="10" y="92" font-size="9" font-weight="700" fill="#1A1A2E">Fresh Milk</text>
      <text x="10" y="108" font-size="9" font-weight="800" fill="#EF4444" text-decoration="line-through">25 TL</text>
      <text x="44" y="108" font-size="9" font-weight="800" fill="#6200EE">19 TL</text>
      <circle cx="68" cy="120" r="11" fill="#6200EE"/><text x="68" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">+</text>
      <!-- card 2 -->
      <rect x="94" y="0" width="84" height="138" rx="11" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
      <rect x="104" y="10" width="64" height="62" rx="8" fill="url(#thumb)"/>
      <text x="104" y="92" font-size="9" font-weight="700" fill="#1A1A2E">Olive Oil</text>
      <text x="104" y="108" font-size="9" font-weight="800" fill="#6200EE">120 TL</text>
      <circle cx="162" cy="120" r="11" fill="#6200EE"/><text x="162" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">+</text>
    </g>
    <text x="105" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#4B5563">Catalogue</text>
  </g>

  <!-- ============ PHONE 4 — BASKET / CHECKOUT ============ -->
  <g transform="translate(702,30)">
    <rect x="0" y="0" width="210" height="440" rx="30" fill="#14141C"/>
    <rect x="8" y="8" width="194" height="424" rx="24" fill="#FFFFFF"/>
    <rect x="78" y="16" width="54" height="13" rx="6.5" fill="#14141C"/>
    <rect x="8" y="38" width="194" height="34" fill="#6200EE"/>
    <text x="105" y="60" text-anchor="middle" font-size="12" font-weight="800" fill="#FFFFFF">Your Basket</text>
    <!-- items -->
    <g transform="translate(16,86)">
      <rect x="0" y="0" width="178" height="56" rx="10" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
      <rect x="8" y="8" width="40" height="40" rx="7" fill="url(#thumb)"/>
      <text x="56" y="22" font-size="9.5" font-weight="700" fill="#1A1A2E">Fresh Milk</text>
      <text x="56" y="38" font-size="9" font-weight="800" fill="#6200EE">19 TL</text>
      <rect x="142" y="16" width="28" height="24" rx="6" fill="#F2F2F2"/><text x="156" y="32" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A2E">2</text>
      <rect x="0" y="66" width="178" height="56" rx="10" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1.2"/>
      <rect x="8" y="74" width="40" height="40" rx="7" fill="url(#thumb)"/>
      <text x="56" y="88" font-size="9.5" font-weight="700" fill="#1A1A2E">Olive Oil</text>
      <text x="56" y="104" font-size="9" font-weight="800" fill="#6200EE">120 TL</text>
      <rect x="142" y="82" width="28" height="24" rx="6" fill="#F2F2F2"/><text x="156" y="98" text-anchor="middle" font-size="10" font-weight="700" fill="#1A1A2E">1</text>
    </g>
    <!-- payment -->
    <text x="105" y="240" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6B7280">PAYMENT METHOD</text>
    <rect x="24" y="250" width="78" height="30" rx="8" fill="#EDE6FF" stroke="#6200EE" stroke-width="1.5"/><text x="63" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#6200EE">Card</text>
    <rect x="108" y="250" width="78" height="30" rx="8" fill="#F2F2F2"/><text x="147" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#4B5563">Cash</text>
    <!-- total -->
    <text x="24" y="318" font-size="11" font-weight="700" fill="#1A1A2E">Total</text>
    <text x="186" y="318" text-anchor="end" font-size="13" font-weight="800" fill="#6200EE">158 TL</text>
    <line x1="24" y1="296" x2="186" y2="296" stroke="#E2E2E2" stroke-width="1.2"/>
    <rect x="24" y="336" width="162" height="40" rx="20" fill="#6200EE"/>
    <text x="105" y="361" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Proceed to CheckOut</text>
    <text x="105" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#4B5563">Basket &amp; checkout</text>
  </g>

  <!-- ============ PHONE 5 — STAFF QR SCANNER ============ -->
  <g transform="translate(928,30)">
    <rect x="0" y="0" width="210" height="440" rx="30" fill="#14141C"/>
    <rect x="8" y="8" width="194" height="424" rx="24" fill="#FFFFFF"/>
    <rect x="78" y="16" width="54" height="13" rx="6.5" fill="#14141C"/>
    <rect x="8" y="38" width="194" height="34" fill="#1A1A2E"/>
    <text x="105" y="60" text-anchor="middle" font-size="11.5" font-weight="800" fill="#FFFFFF">Staff · Scan QR Code</text>
    <text x="105" y="104" text-anchor="middle" font-size="9.5" fill="#6B7280">Move your camera over the QR code</text>
    <!-- scan frame -->
    <rect x="45" y="124" width="120" height="120" rx="10" fill="#F7F5FF"/>
    <g stroke="#6200EE" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M45 150 V134 a10 10 0 0 1 10 -10 H71"/><path d="M165 150 V134 a10 10 0 0 0 -10 -10 H139"/>
      <path d="M45 218 V234 a10 10 0 0 0 10 10 H71"/><path d="M165 218 V234 a10 10 0 0 1 -10 10 H139"/>
    </g>
    <!-- qr -->
    <g transform="translate(78,157)" fill="#1A1A2E">
      <rect width="54" height="54" fill="none"/>
      <rect x="0" y="0" width="16" height="16"/><rect x="4" y="4" width="8" height="8" fill="#F7F5FF"/>
      <rect x="38" y="0" width="16" height="16"/><rect x="42" y="4" width="8" height="8" fill="#F7F5FF"/>
      <rect x="0" y="38" width="16" height="16"/><rect x="4" y="42" width="8" height="8" fill="#F7F5FF"/>
      <rect x="22" y="0" width="6" height="6"/><rect x="22" y="12" width="6" height="6"/><rect x="32" y="22" width="6" height="6"/>
      <rect x="22" y="32" width="6" height="6"/><rect x="44" y="32" width="6" height="6"/><rect x="22" y="44" width="6" height="6"/><rect x="38" y="44" width="6" height="6"/>
    </g>
    <rect x="45" y="372" width="120" height="38" rx="10" fill="#6200EE"/>
    <text x="105" y="396" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">Scan QR Code</text>
    <text x="105" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#4B5563">Staff: inventory</text>
  </g>
</svg>
